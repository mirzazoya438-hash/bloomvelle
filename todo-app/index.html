<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <div class="header">
                <h1>📝 My Todo List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="Add a new task..." 
                        class="input-field"
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">➕ Add</button>
                </div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value completed" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value active" id="remainingTasks">0</span>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todo-list" id="todoList">
                <p class="empty-message">No tasks yet. Add one to get started! 🚀</p>
            </div>

            <!-- Clear Completed Button -->
            <div class="action-section">
                <button id="clearCompleted" class="clear-btn">🗑️ Clear Completed</button>
                <button id="clearAll" class="clear-all-btn">⚠️ Clear All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
